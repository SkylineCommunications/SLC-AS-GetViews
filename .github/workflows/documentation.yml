name: Build and Deploy Documentation

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
  workflow_dispatch:

jobs:
  build_job:
    runs-on: ubuntu-latest
    name: Build Job
    defaults:
      run:
        working-directory: Documentation
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: install DocFX
        run: dotnet tool update -g docfx
        env:
          CI: true

      - name: Build Documentation project
        run: dotnet build

  secrets:
    runs-on: ubuntu-latest
    outputs:
      HAS_DATAMINER_DEPLOY_KEY: ${{ steps.check.outputs.DATAMINER_DEPLOY_KEY }}
    steps:
      - run: >
          echo "DATAMINER_DEPLOY_KEY=${{ env.DATAMINER_DEPLOY_KEY != '' }}" >> $GITHUB_OUTPUT
        id: check
        env:
          DATAMINER_DEPLOY_KEY: ${{ secrets.DATAMINER_DEPLOY_KEY }}

  deploy_job:
    runs-on: ubuntu-latest
    name: Deploy Job
    needs: ["build_job", "secrets"]
    if: needs.secrets.outputs.HAS_DATAMINER_DEPLOY_KEY == 'true'
    defaults:
      run:
        working-directory: Documentation

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: install DocFX
        run: dotnet tool update -g docfx

      - name: Install .NET Tools
        run: |
          dotnet tool install -g Skyline.DataMiner.CICD.Tools.CatalogUpload
          dotnet tool install -g Skyline.DataMiner.CICD.Tools.DataMinerDeploy

      - name: Build Documentation project
        run: dotnet build

      - name: Upload package to Catalog
        id: uploadSkyline
        run: |
          ARTIFACT=$(find bin/Debug -name "*.dmapp" -exec realpath {} \; | head -n 1)
          echo "Artifact found at: $ARTIFACT"
          UPLOAD_OUTPUT=$(dataminer-catalog-upload --path-to-artifact "$ARTIFACT" --dm-catalog-token "${{ secrets.DATAMINER_DEPLOY_KEY }}")
          echo "id=$UPLOAD_OUTPUT" >> $GITHUB_OUTPUT

      - name: Deploy package from Catalog
        run: dataminer-package-deploy from-volatile --artifact-id "${{ steps.uploadSkyline.outputs.id }}" --dm-system-token "${{ secrets.DATAMINER_DEPLOY_KEY }}"
